<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPH Half · Training Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
/* ============ TOKENS ============ */
:root {
  --bg: #0E0F0E;
  --surface: #161817;
  --surface-2: #1E211F;
  --line: #262A28;
  --line2: #353A37;
  --fg: #F5F5F0;
  --dim: #8A8E89;
  --dim2: #5C605D;
  --accent: #D5FF3A;
  --accent-ink: #0E0F0E;
  --coral: #FF6B5C;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-feature-settings: 'ss01', 'cv11';
  -webkit-font-smoothing: antialiased;
  font-size: 15px;
  line-height: 1.4;
  letter-spacing: -0.005em;
}
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: 'tnum'; letter-spacing: 0; }
.dim { color: var(--dim); }
.accent { color: var(--accent); }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }

/* ============ APP SHELL ============ */
.app { max-width: 1200px; margin: 0 auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

/* ============ HEADER ============ */
.hdr { display: flex; flex-direction: column; gap: 10px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
.hdr-top { display: flex; justify-content: space-between; align-items: center; }
.hdr-eyebrow { display: flex; align-items: center; gap: 8px; font-size: 11px; }
.dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; background: var(--dim); flex-shrink: 0; }
.dot-live { background: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent); animation: pulse 2s infinite; }
@keyframes pulse { 50% { opacity: 0.5; } }
.hdr-sep { color: var(--dim2); }
.hdr-main { display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; }
.hdr-race { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.hdr-date { font-size: clamp(36px, 6vw, 64px); font-weight: 800; letter-spacing: -0.03em; line-height: 0.95; }
.hdr-meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; }
.hdr-countdown { text-align: right; padding: 12px 18px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface); flex-shrink: 0; }
.cd-num { font-size: clamp(28px, 5vw, 44px); font-weight: 700; color: var(--accent); line-height: 1; letter-spacing: -0.02em; }
.cd-lbl { font-size: 10px; margin-top: 4px; }

/* ============ TODAY HERO ============ */
.today {
  position: relative;
  background: radial-gradient(ellipse at top right, color-mix(in srgb, var(--accent) 18%, transparent), transparent 60%), var(--surface);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 20px;
  overflow: hidden;
}
.today::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; opacity: 0.08;
  background-image: radial-gradient(circle, var(--fg) 0.5px, transparent 1px);
  background-size: 14px 14px;
  -webkit-mask: radial-gradient(ellipse 80% 60% at top right, black 30%, transparent 70%);
  mask: radial-gradient(ellipse 80% 60% at top right, black 30%, transparent 70%);
}
.today-tag { display: flex; align-items: center; gap: 8px; font-size: 11px; position: relative; }
.today-grid { display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end; margin: 14px 0 16px; position: relative; }
.today-main { min-width: 0; }
.today-type { font-size: 11px; margin-bottom: 4px; letter-spacing: 0.04em; }
.today-dist { font-size: clamp(48px, 9vw, 88px); font-weight: 800; line-height: 0.9; letter-spacing: -0.04em; }
.today-dist-unit { font-size: 0.35em; color: var(--dim); vertical-align: middle; }
.today-detail { color: var(--dim); margin-top: 8px; font-size: 14px; }
.today-side { display: flex; gap: 24px; }
.metric { text-align: right; }
.metric-lbl { font-size: 10px; }
.metric-val { font-size: 15px; margin-top: 2px; font-weight: 600; }
.today-actions { display: flex; gap: 8px; flex-wrap: wrap; position: relative; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 14px; border-radius: 8px; font-weight: 600; font-size: 13px; transition: all 0.15s; border: 1px solid transparent; cursor: pointer; }
.btn-done { background: var(--accent); color: var(--accent-ink); }
.btn-done:hover { transform: translateY(-1px); box-shadow: 0 4px 14px color-mix(in srgb, var(--accent) 30%, transparent); }
.btn-done.is-active { opacity: 0.7; }
.btn-skip { background: var(--surface-2); color: var(--fg); border-color: var(--line); }
.btn-skip:hover { border-color: var(--coral); color: var(--coral); }
.btn-skip.is-active { border-color: var(--coral); color: var(--coral); background: color-mix(in srgb, var(--coral) 10%, var(--surface-2)); }

/* ============ STATS ============ */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.stat { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 6px; min-height: 100px; justify-content: space-between; }
.stat-lbl { font-size: 10px; }
.stat-val { font-family: 'JetBrains Mono', monospace; font-feature-settings: 'tnum'; font-size: 32px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; }
.stat-unit { font-size: 14px; color: var(--dim); margin-left: 4px; font-weight: 500; }
.stat-sub { font-size: 10px; }

/* ============ PROGRESS ============ */
.progress { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; }
.prog-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.prog-title { font-size: 11px; }
.prog-counts { display: flex; gap: 14px; font-size: 12px; }
.prog-count { display: inline-flex; align-items: center; gap: 5px; }
.bar { position: relative; background: var(--line); border-radius: 99px; overflow: hidden; }
.bar-done { position: absolute; inset: 0 auto 0 0; background: var(--accent); border-radius: 99px; }
.bar-skip { position: absolute; top: 0; bottom: 0; background: var(--coral); }
.prog-curve { margin-top: 14px; height: 340px; }
.curve { width: 100%; height: 100%; display: block; }
.curve-peak-label { font-family: 'JetBrains Mono', monospace; font-size: 5px; font-weight: 700; fill: var(--accent-ink); letter-spacing: 0.04em; }
.curve-current { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; fill: var(--accent); letter-spacing: 0.06em; }
.prog-axis { display: flex; justify-content: space-between; font-size: 10px; margin-top: 4px; }

/* ============ SECTION TITLE ============ */
.section-title { display: flex; justify-content: space-between; align-items: center; font-size: 11px; padding-top: 4px; }
.section-title span:first-child { color: var(--fg); letter-spacing: 0.06em; }
.section-title .dim { font-size: 10px; }

/* ============ PHASES ============ */
.phases { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.phase {
  background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 12px;
  text-align: left; display: flex; flex-direction: column; gap: 8px; transition: all 0.15s;
  position: relative; overflow: hidden; width: 100%; cursor: pointer;
}
.phase::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--pc); opacity: 0; transition: opacity 0.15s; }
.phase:hover { border-color: var(--line2); }
.phase.is-active { border-color: var(--pc); background: color-mix(in srgb, var(--pc) 8%, var(--surface)); }
.phase.is-active::before { opacity: 1; }
.phase-top { display: flex; justify-content: space-between; align-items: baseline; }
.phase-name { font-weight: 600; font-size: 14px; }
.phase-wks { font-size: 10px; }
.phase-stat { font-size: 18px; font-weight: 700; }
.phase-num { color: var(--pc); }
.phase-bar { height: 3px; background: var(--line); border-radius: 99px; overflow: hidden; }
.phase-bar-fill { height: 100%; background: var(--pc); border-radius: 99px; transition: width 0.3s; }

/* ============ PHASE BANNER ============ */
.phase-banner { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; padding: 12px 16px; border-radius: 10px; background: color-mix(in srgb, var(--pc) 10%, var(--surface)); border-left: 3px solid var(--pc); }
.phase-banner-l { display: flex; align-items: baseline; gap: 4px; }
.phase-banner-name { color: var(--pc); font-weight: 700; font-size: 15px; }
.phase-banner-note { color: var(--fg); font-size: 13px; flex: 1; }

/* ============ WEEKS ============ */
.weeks { display: flex; flex-direction: column; gap: 6px; }
.week { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; transition: border-color 0.15s; }
.week.is-open { border-color: var(--line2); }
.week-head { width: 100%; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 14px 16px; transition: background 0.15s; cursor: pointer; }
.week-head:hover { background: var(--surface-2); }
.week-head-l { display: flex; align-items: baseline; gap: 12px; min-width: 0; }
.week-num { font-size: 16px; font-weight: 700; letter-spacing: 0.02em; }
.week-range { font-size: 11px; }
.week-head-r { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.badge { font-family: 'JetBrains Mono', monospace; font-size: 9px; padding: 3px 7px; border-radius: 4px; font-weight: 700; letter-spacing: 0.05em; }
.badge-now { background: var(--accent); color: var(--accent-ink); }
.badge-recovery { background: var(--surface-2); color: var(--dim); border: 1px solid var(--line2); }
.badge-vacation { background: color-mix(in srgb, #5BA3FF 20%, transparent); color: #5BA3FF; }
.badge-adjusted { background: color-mix(in srgb, #FF8A4C 20%, transparent); color: #FF8A4C; }
.week-done { font-size: 11px; color: var(--dim); }
.week-mi { font-size: 13px; }
.week-mi b { font-weight: 700; color: var(--fg); }
.week-bar { width: 60px; height: 4px; background: var(--line); border-radius: 99px; overflow: hidden; }
.week-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; }
.chev { color: var(--dim); font-size: 12px; width: 12px; }

.week-body { border-top: 1px solid var(--line); }
.day-grid-head, .day { display: grid; grid-template-columns: 110px 100px 1fr 130px 90px; align-items: center; gap: 14px; padding: 10px 16px; font-size: 13px; }
.day-grid-head { font-size: 9px; padding-top: 10px; padding-bottom: 6px; border-bottom: 1px dashed var(--line); }
.day { border-bottom: 1px solid var(--line); transition: background 0.15s; }
.day:last-child { border-bottom: 0; }
.day:hover { background: var(--surface-2); }
.day.is-rest { opacity: 0.55; }
.day.is-done .day-workout { color: var(--dim); text-decoration: line-through; text-decoration-color: var(--dim2); }
.day.is-today { background: color-mix(in srgb, var(--accent) 6%, transparent); position: relative; }
.day.is-today::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--accent); }
.day-day { font-size: 11px; font-weight: 700; }
.day-workout { font-weight: 500; }
.day-pace { font-size: 11px; }
.day-actions { display: flex; gap: 6px; justify-content: flex-end; align-items: center; }
.act { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--line2); display: inline-grid; place-items: center; font-size: 12px; color: var(--dim); transition: all 0.15s; cursor: pointer; background: none; font-family: inherit; }
.act:hover { border-color: var(--fg); color: var(--fg); }
.act-done { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.act-skipped { background: color-mix(in srgb, var(--coral) 15%, transparent); color: var(--coral); border-color: var(--coral); }
.act-skip:hover { border-color: var(--coral); color: var(--coral); }
.now-tag { background: var(--accent); color: var(--accent-ink); font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; letter-spacing: 0.05em; font-family: 'JetBrains Mono', monospace; }

/* ============ PILL ============ */
.pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-weight: 600; background: color-mix(in srgb, var(--c) 14%, transparent); color: var(--c); border: 1px solid color-mix(in srgb, var(--c) 30%, transparent); letter-spacing: 0.03em; font-size: 11px; white-space: nowrap; }
.pill-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--c); flex-shrink: 0; }

/* ============ PACES ============ */
.paces { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
.paces-head { font-size: 11px; margin-bottom: 12px; }
.paces-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
.pace { display: flex; gap: 10px; align-items: center; padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--bg); }
.pace-strip { width: 3px; align-self: stretch; border-radius: 99px; flex-shrink: 0; }
.pace-info { display: flex; flex-direction: column; gap: 2px; }
.pace-name { font-weight: 600; font-size: 13px; }
.pace-range { font-size: 11px; }

/* ============ FOOTER ============ */
.ftr { display: flex; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--line); font-size: 10px; flex-wrap: wrap; gap: 8px; }

/* ============ RESPONSIVE ============ */
@media (max-width: 900px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .phases { grid-template-columns: repeat(2, 1fr); }
  .day-grid-head, .day { grid-template-columns: 80px 90px 1fr auto; }
  .day-pace { display: none; }
  .day-grid-head span:nth-child(4) { display: none; }
}
@media (max-width: 640px) {
  .app { padding: 16px; gap: 16px; }
  .hdr-main { flex-direction: column; align-items: flex-start; gap: 12px; }
  .hdr-countdown { align-self: stretch; display: flex; justify-content: space-between; align-items: center; text-align: left; }
  .cd-num { font-size: 32px; }
  .today { padding: 16px; }
  .today-grid { grid-template-columns: 1fr; gap: 16px; }
  .today-side { gap: 18px; justify-content: flex-start; }
  .metric { text-align: left; }
  .stats { grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .stat { padding: 12px; min-height: 88px; }
  .stat-val { font-size: 26px; }
  .week-head { padding: 12px; gap: 8px; flex-wrap: wrap; }
  .week-head-r { gap: 8px; }
  .week-bar { display: none; }
  .week-range { font-size: 10px; }
  .day-grid-head { display: none; }
  .day {
    grid-template-columns: 56px 1fr auto;
    grid-template-areas: "day type actions" "day workout actions" "day pace actions";
    row-gap: 4px; padding: 12px;
  }
  .day-day { grid-area: day; align-self: start; }
  .day-type { grid-area: type; }
  .day-workout { grid-area: workout; font-size: 14px; }
  .day-pace { grid-area: pace; display: block; }
  .day-actions { grid-area: actions; align-self: center; }
  .phase-banner { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>

// ============ APP STATE ============
let S = {};
let activePh = 1;
const openWeeks = new Set();
let syncedAt = null;
let saveTimer = null;

// ============ SUPABASE ============
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function pullState() {
  try {
    const { data, error } = await sb.from('training_progress').select('state').eq('id','main').single();
    if (!error && data) {
      S = data.state || {};
      syncedAt = new Date();
      localStorage.setItem('cph2026v1', JSON.stringify(S));
      return;
    }
  } catch(e) {}
  const stored = localStorage.getItem('cph2026v1');
  if (stored) try { S = JSON.parse(stored); } catch(e) {}
}

async function pushState() {
  try {
    await sb.from('training_progress').upsert({ id: 'main', state: S, updated_at: new Date().toISOString() });
    syncedAt = new Date();
  } catch(e) {}
  localStorage.setItem('cph2026v1', JSON.stringify(S));
  render();
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(pushState, 800);
}

// ============ HELPERS ============
const PASSIVE = new Set(['rest','norun']);

function stateKey(wkNum, dayName) { return 'w' + wkNum + '_' + dayName; }

function getTodayInfo() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const planStart = new Date(2026, 3, 28); // Apr 28, 2026
  const diffDays = Math.floor((today - planStart) / 86400000);
  if (diffDays < 0 || diffDays >= 21 * 7) return null;
  const week = WEEKS[Math.floor(diffDays / 7)];
  if (!week) return null;
  const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const dayName = DAY_NAMES[(today.getDay() + 6) % 7];
  const dayObj = week.days.find(d => d.day === dayName);
  if (!dayObj) return null;
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return { week, dayObj, weekNum: week.w, dayName, dateStr: MONTHS[today.getMonth()] + ' ' + today.getDate() };
}

function getDaysToRace() {
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.max(0, Math.ceil((new Date(2026, 8, 20) - today) / 86400000));
}

function countAll() {
  let total = 0, done = 0, skipped = 0;
  WEEKS.forEach(w => w.days.forEach(day => {
    if (PASSIVE.has(day.type)) return;
    total++;
    const v = S[stateKey(w.w, day.day)];
    if (v === 'done') done++; else if (v === 'skip') skipped++;
  }));
  return { total, done, skipped, remaining: total - done - skipped };
}

function countPhase(phId) {
  let total = 0, done = 0, skipped = 0;
  WEEKS.filter(w => w.ph === phId).forEach(w => w.days.forEach(day => {
    if (PASSIVE.has(day.type)) return;
    total++;
    const v = S[stateKey(w.w, day.day)];
    if (v === 'done') done++; else if (v === 'skip') skipped++;
  }));
  return { total, done, skipped };
}

function countWeek(wk) {
  let total = 0, done = 0, skipped = 0;
  wk.days.forEach(day => {
    if (PASSIVE.has(day.type)) return;
    total++;
    const v = S[stateKey(wk.w, day.day)];
    if (v === 'done') done++; else if (v === 'skip') skipped++;
  });
  return { total, done, skipped };
}

function fmtTime(d) {
  if (!d) return '—';
  const h = d.getHours(), m = d.getMinutes();
  return (h % 12 || 12) + ':' + String(m).padStart(2,'0') + ' ' + (h >= 12 ? 'PM' : 'AM');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============ ACTIONS ============
function toggleDone(wkNum, dayName) {
  const k = stateKey(wkNum, dayName);
  if (S[k] === 'done') delete S[k]; else S[k] = 'done';
  scheduleSave(); render();
}

function toggleSkip(wkNum, dayName) {
  const k = stateKey(wkNum, dayName);
  if (S[k] === 'skip') delete S[k]; else S[k] = 'skip';
  scheduleSave(); render();
}

function toggleWeek(wkNum) {
  if (openWeeks.has(wkNum)) openWeeks.delete(wkNum); else openWeeks.add(wkNum);
  render();
}

function setPhase(phId) {
  activePh = phId; openWeeks.clear(); render();
}

// ============ SVG MILEAGE CURVE ============
function mileageCurve(currentWeek) {
  const w = 800, h = 200, pad = 8, topPad = 50;
  const max = Math.max(...MILEAGE_ARC);
  const pts = MILEAGE_ARC.map((m, i) => [
    pad + (i / (MILEAGE_ARC.length - 1)) * (w - pad * 2),
    h - pad - 18 - (m / max) * (h - topPad - pad - 18),
  ]);
  const path = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const area = path + ' L' + pts[pts.length-1][0].toFixed(1) + ',' + h + ' L' + pts[0][0].toFixed(1) + ',' + h + ' Z';
  const pi = MILEAGE_ARC.indexOf(max);
  const ci = Math.min(Math.max((currentWeek || 1) - 1, 0), MILEAGE_ARC.length - 1);
  const [cx, cy] = pts[ci], [px, py] = pts[pi];

  const phases = [
    {from:0, to:2,  c:'#7BC96F'}, {from:2, to:5,  c:'#5BA3FF'},
    {from:5, to:15, c:'#FF8A4C'}, {from:15, to:21, c:'#F5C13D'},
  ].map(p => {
    const x1 = (pad + (p.from / 20) * (w - pad*2)).toFixed(1);
    const x2 = (pad + (p.to   / 20) * (w - pad*2)).toFixed(1);
    return `<rect x="${x1}" y="0" width="${(x2-x1).toFixed(1)}" height="${h}" fill="${p.c}" opacity="0.04"/>`;
  }).join('');

  const grid = [0.25,0.5,0.75].map(g =>
    `<line x1="0" x2="${w}" y1="${(h*g).toFixed(1)}" y2="${(h*g).toFixed(1)}" stroke="var(--line)" stroke-dasharray="2 4"/>`
  ).join('');

  const dots = pts.map(([x,y],i) =>
    i === pi || i === ci ? '' : `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="1.6" fill="var(--fg)" opacity="0.35"/>`
  ).join('');

  return `<svg class="curve" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="g1" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${phases}${grid}
    <path d="${area}" fill="url(#g1)"/>
    <path d="${path}" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
    ${dots}
    <line x1="${px.toFixed(1)}" x2="${px.toFixed(1)}" y1="${(py+5).toFixed(1)}" y2="${(py+22).toFixed(1)}" stroke="var(--accent)" stroke-width="1"/>
    <rect x="${(px-38).toFixed(1)}" y="${(py+22).toFixed(1)}" width="76" height="18" rx="3" fill="var(--accent)"/>
    <text x="${px.toFixed(1)}" y="${(py+31).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" class="curve-peak-label">PEAK · 42 MI</text>
    <circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="3.5" fill="var(--accent)" stroke="var(--bg)" stroke-width="1.5"/>
    <circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="9" fill="var(--accent)" opacity="0.18">
      <animate attributeName="r" values="7;11;7" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.28;0.08;0.28" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="5.5" fill="var(--bg)" stroke="var(--accent)" stroke-width="2"/>
    <circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="2.5" fill="var(--accent)"/>
    <text x="${cx.toFixed(1)}" y="${(h-4).toFixed(1)}" text-anchor="middle" class="curve-current">WK ${currentWeek} · YOU</text>
  </svg>`;
}

          ${badges}
          <span class="week-done mono dim">${wc.done}/${wc.total}</span>
          <span class="week-mi mono"><b>${wk.mi}</b><span class="dim"> MI</span></span>
          <div class="week-bar"><div class="week-bar-fill" style="width:${pct}%"></div></div>
          <span class="chev">${isOpen?'▾':'▸'}</span>
        </div>
      </button>
      ${body}
    </div>`;
  }).join('')}</div>`;
}

function renderPaceGuide() {
  return `<section class="paces">
    <div class="paces-head mono dim">PACE GUIDE</div>
    <div class="paces-grid">${PACE_GUIDE.map(type => `<div class="pace">
      <span class="pace-strip" style="background:${TYPE_COLOR[type]}"></span>
      <div class="pace-info">
        <div class="pace-name">${esc(TYPE_LABEL[type]||type)}</div>
        <div class="pace-range mono dim">${esc(TYPE_RANGE[type]||'')}</div>
      </div>
    </div>`).join('')}
    </div>
  </section>`;
}

// ============ MAIN RENDER ============
function render() {
  const ti = getTodayInfo();
  const counts = countAll();
  const currentWeek = ti ? ti.weekNum : 1;
  document.getElementById('app').innerHTML = `<div class="app">
    ${renderHeader()}
    ${renderTodayHero(ti)}
    ${renderStats()}
    ${renderProgress(counts, currentWeek)}
    <div class="section-title mono"><span>PHASES</span><span class="dim">4 BLOCKS · 21 WEEKS</span></div>
    ${renderPhases()}
    ${renderPhaseBanner()}
    <div class="section-title mono"><span>WEEKS</span><span class="dim">SCROLL TO SEE ALL</span></div>
    ${renderWeeksList(ti)}
    ${renderPaceGuide()}
    <footer class="ftr mono dim">
      <span>CPH HALF · v2.0</span>
      <span>SUB-1:33 · 7:07 /MI</span>
      <span>SYNCED ${fmtTime(syncedAt)}</span>
    </footer>
  </div>`;
}

// ============ INIT ============
render();
pullState().then(() => render());
</script>
</body>
</html>
